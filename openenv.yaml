name: incident_response_env
version: "1.0.0"
description: >
  On-call incident response triage environment. An AI agent receives system
  alerts and must diagnose root causes by querying logs, metrics, and service
  dependencies, then apply corrective actions. Features 3 tasks ranging from
  a simple crashed service to an intermittent multi-replica failure.
author: meta-llica
tags:
  - openenv
  - devops
  - incident-response
  - sre
  - real-world
entry_point: inference.py
env_vars:
  - HF_TOKEN
  - MODEL_NAME
  - API_BASE_URL
runtime:
  max_minutes: 20
  cpu: 2
  memory_gb: 8
tasks:
  - easy_crashed_service
  - medium_intermittent_ghost
  - hard_cascading_failure
